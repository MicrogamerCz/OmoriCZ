#Talking to DUCH CYLINDR before collecting all the Ghosts

message_39:
      text: \n<DUCH CYLINDR>Máte 6 \c[4]DĚSIVÝCH MAP\c[0] se směrem k mému večírku.\!<br>Každá z nich má mou CYLINDRICKOU pečeť. #konzistence

message_40:
      text: \n<DUCH CYLINDR>Doneste tyto mapy prosím ke všem mým hostům.<br>\!Věřím, že s nimi se sem rozhodně eventuelně dostaví. #konzistence

#Talking to DUCH CYLINDR after collecting all ghosts

message_41:
      text: \n<DUCH CYLINDR>\Com[2]\{HURÁ! HOSTINA JE ZACHRÁNĚNA!!

message_42:
      text: \n<DUCH CYLINDR>A teď...\!<br>\{\Sinv[1]NECHŤ ZAČNE OSLAVA!!\}\Sinv[0]

#GHOSTS DO A DANCE

message_50:
      text: \n<DUCH PLNOVOUS>Tenhle večírek je senzační!\! Tady je něco, co jsem nabalil na cestě jsem.\! Není to moc, ale víc toho nemám!

message_51:
      text: \n<DUCH BREJLOVEC>Ach...\! Tenhle večírek je přesně takový, jak jsem si ho představoval.\! Opět děkuji, že jste mě sem zavedli.\! Tenhle dárek je pro vás!

message_52:
      text: \n<DUCH KNÍREK>To je ale úžasný večírek!\! DUCH CYLINDR se s každým dalším večírkem překonává!\! Jsem vám dlužen, přátelé. Na, vemte si tohle!

message_53:
      text: \n<PRINCEZNA DUCHOVÁ>Toť majestátní oslava!\! A díky patří vám, bez vás bych zde nebyla.\! Přijměte ode mě prosím tento dárek!

message_54:
      text: \n<DUCH VRTULKA>Ojojoj! Nevěřím, že jsem vážně tady!\! A určitě vypadám strašně hustě s tím, kolik se vás tady kolem mě motá...\! Tak to vám musím oplatit!

message_55:
      text: \n<DUCH SLAMÁK>Díky, děti!\! Na téhle oslavě si hned víc užívám posmrtného života!\! Tohle si musíte vzít na oplátku, ani nevíte, jak jste mi zlepšili den!

message_56:
      text: \n<DUCH CYLINDR>Mí přátelé! Máte mé věčné díky.\! Užijte si prosím tento dárek!

message_57:
      text: \n<DUCH CYLINDR>Užijte si naši výbornou společnost!

