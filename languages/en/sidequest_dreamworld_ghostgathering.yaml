
# =========================================================================================
# Ghost Gathering
# ========================================================================================

#Talk to Tophat Ghost

message_0:
      text: \n<DUCH CYLINDR>Panečku, toť skvělé načasování!\!<br>Zdá se, že jsem se dostal do menší patálie.

message_1:
      text: \n<DUCH CYLINDR>Několika svým druhům jsem poslal, zda by se nedostavili na mou vkusnou hostinu...\! ale doteď se neukázal ni jeden host!\! Ni jeden!

message_2:
      text: \n<DUCH CYLINDR>Tohle je nepřípustné.\! Prostější duch by se možná rozzlobil, ale mé smysly mi říkají, že se na cestě sem museli ztratit.

message_3:
      text: \n<DUCH CYLINDR>Víte...\! když jsem ty pozvánky rozeslal...\! zapomněl jsem napsat, kudy se mají vydat! #blíže orig

message_4:
      text: \n<DUCH CYLINDR>Ale jakožto správný džentlmen a hostitel odmítám tento večírek začít dřív, než přijdou všichni hosté.

message_5:
      text: \n<DUCH CYLINDR>Byl byste tak hodný a pomohl mým hostům se sem dostavit?

#[Nod/Shake]
#[Nod]
message_6:
      text: \n<DUCH CYLINDR>Děkuji, milý pane!\!<br>Zde je pár map se směry k mému večírku, zapečetěné mou CYLINDRICKOU pečetí. #vypouštím schválení, cylindrickou

message_7:
      text: \n<DUCH CYLINDR>Doneste tyto mapy prosím ke všem mým hostům.<br>\!Věřím, že s nimi se sem rozhodně eventuelně dostaví. #upřenění

message_8:
      text: Získal jsi 6 \c[4]DĚSIVÝCH MAP\c[0].
#[Shake]
message_9:
      text: \n<DUCH CYLINDR>Hm... Toť škoda.\! To byste opravdu nechali starého ducha, jako jsem já, tuto hostinu prožít o samotě?
#Talk to Beard GHOST

message_10:
      text: \n<DUCH PLNOVOUS>Hmm...\! Počkat, kam že jsem to šel?\!<br>Safra, má paměť už není to, co bývala... #přidáno už

message_11:
      text: Dal jsi DUCHOVI PLNOVOUSOVI \c[4]DĚSIVOU MAPU\c[0].

message_12:
      text: \n<DUCH PLNOVOUS>Cože? Co to máte?\!<br>Mapu k CYLINDROVU večírku?\! Fakt, že jo! #není překvapený, že je večírek, ale že je mapa

message_13:
      text: \n<DUCH PLNOVOUS>To bych si měl pohnout, aby to tam nevychladlo.\!<br>Už jsem na cestě, bufete! #vypouštím zdarma, nemá správný ráz

#Talk to Glasses GHOST

message_14:
      text: \n<DUCH BREJLOVEC>Tady sedím, osaměle hledím...\! uff...\! Konečně mě někdo pozve na večírek a mně se povede tam netrefit...

message_15:
      text: Dal jsi DUCHOVI BREJLOVCOVI \c[4]DĚSIVOU MAPU\c[0].

message_16:
      text: \n<DUCH BREJLOVEC>Ó! Nevěřím svým čtyřem očím! Mapa k CYLINDROVU večírku?\!<br>Vy jste mi teď fakt zachránili život, víte o tom?\!<br>Měl bych už leťet...\! určitě to tam bude supr!


#Talk to Mustache GHOST

message_17:
      text: \n<DUCH KNÍREK>Neřeště mě!\!<br>Já jsem jen lítající knír, žijící si svůj život!

message_18:
      text: Dal jsi DUCHOVI KNÍRKOVI \c[4]DĚSIVOU MAPU\c[0].

message_19:
      text: \n<DUCH KNÍREK>Ty jo, vydržte chviličku! Copak to tady máme?\!<br>Mapa k večírku toho s CYLINDREM?\!<br>No to potěš koště... tak tudy se mám vydat! #jasnější

message_20:
      text: \n<DUCH KNÍREK>\Com[2]Žádný večírek pořádně nezačne, dokud nepřijdu já!\!<br>\quake[1]Hjok, hjok, hjok... chro... hjok, hjok, hjok! \quake[0]

#Talk to Princess GHOST

message_21:
      text: \n<PRINCEZNA DUCHOVÁ>Propána, zdá se, že jsem se opět ztratila...\!<br>Ach... to jsem celá já.

message_22:
      text: Dal jsi PRINCEZNĚ DUCHOVÉ \c[4]DĚSIVOU MAPU\c[0].

message_23:
      text: \n<PRINCEZNA DUCHOVÁ>Panečku! Copak mi to nesete?\!<br>Mapa k večírku pana CYLINDRA? Ano, vskutku! #pravopis

message_24:
      text: \n<PRINCEZNA DUCHOVÁ>Musím si tam ihned pospíšit.<br>Chodit pozdě se na princeznu nesluší!


#Talk to Propeller GHOST

message_25:
      text: \n<DUCH VRTULKA>Fňuk... Fňuk... No tak...\!<br>Jaktože jsem se zase ztratil?

message_26:
      text: Dal jsi DUCHOVI VRTULKOVI \c[4]DĚSIVOU MAPU\c[0].

message_27:
      text: \n<DUCH VRTULKA>Ach... Ahoj...\! Cože? Je tohle mapa?\! Počkat, vidím na ní CYLINDRICKOU pečeť!\! Ejhle! Tohle musí být cesta na ten večírek!<br>Děkuji převelice, milý pane! #konzistence

message_28:
      text: \n<DUCH VRTULKA>Uvidíme se tam!

#Talk to DUCH SLAMÁK

message_29:
      text: \n<DUCH SLAMÁK>Hm, tohle se mi nějak nezdá.\!<br>Musel jsem někde blbě zabočit...

message_30:
      text: Dal jsi DUCHOVI SLAMÁKOVI \c[4]DĚSIVOU MAPU\c[0].

message_31:
      text: \n<DUCH SLAMÁK>Co je tohle? Mapa?\!<br>Ojej... je na ní dokonce CYLINDRICKÁ pečeť!\!<br>Teď už bych se tam konečně mohl dostat.

message_32:
      text: \n<DUCH SLAMÁK>Děkuji vám, děti!\!<br>Teď už musím vyrazit, už teď jsem dost mimo.

#Talking to other Ghosts before talking to Tophat GHOST

message_33:
      text: DUCH PLNOVOUS se kolem sebe ztraceně rozhlíží.

message_34:
      text: DUCH BREJLOVEC se kolem sebe ztraceně rozhlíží.

message_35:
