# =========================================================================================
# Cooking Help
# =========================================================================================

message_0:
      text: \n<PANÍ S COPÁNKY>Zdravím!\! Na tebe si pamatuju! Ty jsi ten kluk, co nám vybral tapetu.\! Koukám, že sis s sebou vzal kamarády!

message_1:
      text: \n<PANÍ S COPÁNKY>Jestli jste sem přišli na ten večírek, tak se omlovám. To jste tady ještě brzo...

message_2:
      faceset: MainCharacters_Faraway
      faceindex: 17
      text: \kelSafra... Naše chyba!\! Tak my příjdeme o něco později!

message_3:
      faceset: MainCharacters_Faraway
      faceindex: 31
      text: \herHm?\! Čmuch...\! Co?\! Cítíte to taky?\!<br>Jako by se tady něco připálilo...

message_4:
      text: \n<PANÍ S COPÁNKY>\com[2]\{\quake[1]ÍÍÍÍÍÍÍ!!\quake[0] OMLUVTE MĚ NA CHVILKU!

#KAREN slams the door, then reopens it

message_5:
      text: \n<PANÍ S COPÁNKY>...

message_6:
      text: \n<PANÍ S COPÁNKY>Takže...\! No...\! Neuměl by někdo z vás vařit?\! Asi bych trochu potřebovala pomoct s večeří...

message_7:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: \kelTak vy byste potřebovala pomoct s vařením?\! Tak to máte štěstí, že jdeme zrovna kolem!<br>\!Můj brácha HERO je skvělý kuchař!\! Ten vám něco rozhodně uvaří! Ha ha...

message_8:
      faceset: MainCharacters_Faraway
      faceindex: 37
      text: \herC-Cože?\! Já?

message_9:
      text: \n<PANÍ S COPÁNKY>Děkuji vám!\! Jen pojďte dál!

#Talk to KAREN inside

message_10:
      text: \n<PANÍ S COPÁNKY>Promiňte, že vás takhle otravuju...\! Pro tolik lidí jsem ještě nevařila, takže jsem poněkud nervózní...

message_11:
      faceset: MainCharacters_Faraway
      faceindex: 13
      text: \kelAle, nemějte starosti.\! My vám přece pomůžeme! Že jo!?\! \sinv[1]Že jo?\sinv[0]

message_12:
      faceset: MainCharacters_Faraway
      faceindex: 38
      text: \herNo... Tak teda dobře... \!Jdeme na to.\!<br>Však já vás naučím!

message_13:
      faceset: MainCharacters_Faraway
      faceindex: 5
      text: \aubCože? Počkat... To jako i já!?

message_14:
    faceset: MainCharacters_Faraway
    faceindex: 38
    text: \herNo samozřejmě!\! Jako malí jsme spolu vařili přece pořád, ne?

message_15:
    text: \n<PANÍ S COPÁNKY>Děkujeme vám! Máte k dispozici všechny ingredience, co najdete!\! Moc jich tady stejně není...

message_16:
    faceset: MainCharacters_Faraway
    faceindex: 30
    text: \herAle... Však určitě uděláme něco vynikajícího!\!<br>Tak jde se na to!

message_17:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: \kel\Com[2]\{\SINV[1]ANO, KAPITÁNE!!\SINV[0]

# ===============================================
#Cutscene: Hero helps KAREN Cook
# ===============================================

#SEAN walks inside.

message_18:
      text: \n<CHLÁPEK V KOSTKOVANÉ KOŠILI>Ty jo... Co to tady tak úžasně voní?

message_19:
      text: \n<PANÍ S COPÁNKY>Jé, ahoj SEANE!\! To nám naši noví přátelé pomáhali s dnešní večeří!

message_20:
      text: \n<CHLÁPEK V KOSTKOVANÉ KOŠILI>No teda...\! Vypadá, že vám to jde od ruky!\!<br>Už jsem dořešil venek, tak se k vám klidně přidám!

message_21:
      text: \n<PANÍ S COPÁNKY>\sinv[1]Jupí!\! A teď můžeme vařit všichni společně!

#Cooking montage: Everyone standing near the oven

message_22:
      text: \n<PANÍ S COPÁNKY>\sinv[1]Fuj...\sinv[0] A je to!\! With your help, this party is going to be a great success!

message_23:
      text: \n<PANÍ S COPÁNKY>Všem bych vám ještě jednou chtěla pomoct za to, že jste nám dneska tak pomohli.<br>\!Jste opravdu poctiví a milí!

message_24:
    faceset: MainCharacters_Faraway
    faceindex: 29
    text: \herAle, stačí říct!\! A díky, že jste nám to tady svěřila...<br>\!Vážně nás bavilo tady s váma vařit!

message_25:
    faceset: MainCharacters_Faraway
    faceindex: 14
    text: \kelJo, bylo to super!\! Už se nemůžu dočkat na ten večírek!

message_26:
      text: \n<CHLÁPEK V KOSTKOVANÉ KOŠILI>Budeme se na vás těšit!

message_27:
      text: \n<PANÍ S COPÁNKY>Mějte se!


message_100:
      text: \n<PANÍ S COPÁNKY>Ahoj všichni! Pojďte dál!\! Večírek už je v plném proudu!

message_101:
      text: Vynikající \c[3]SUŠENKY\c[0]!

message_102:
      text: Starý \c[3]KOLÁČ\c[0]!

message_103:
      text: Čerstvý \c[3]KOLÁČ\c[0]!

message_104:
      text: Řádné kuře.

message_105:
      text: Salát...

message_106:
      text: \n<CHLÁPEK V KOSTKOVANÉ KOŠILI>Hej! Už se těšíte na večírek?\! Rozhodně přijďte!

message_107:
      text: Nedojezené jídlo.

message_108:
      text: Mňamózní \c[3]KOUSEK DORTU\c[0]!
