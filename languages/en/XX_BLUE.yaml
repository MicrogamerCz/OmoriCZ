# YIN BLACKJACK
# =========================================================================================

Yin_Blackjack:
  bets: [$5,$25,$100,Konec] # Those are the strings in the bet commands
  jack_commands: [Stay, Hit] # Those are the commands for blackjack. They will be uppercased.
  dealer_streak: Krupiér %1 # %1 is streak string
  player_streak: Hráč %1 # %1 is streak string
  streak_string: " - Počet výher - %1" # %1 is the player/dealer streak value
  score: "Skóre: Krupiér - %1   Ty - %2" # %1 and %2 are dealer and player scores
  bet: "Sázka: $%1 x%2Peníze - $%3" # Format numbers references to wagerAmount, playerBonus and currentEarnings
  maincommands: [Nová hra, Pokračovat, Odejít] # Blackjack commands. They will be uppercased.

