message_19:
      text: Na plakátě je nabídka nádenní brigády, konkrétně třídění nářadí.

message_20:
      faceset: MainCharacters_Faraway
      faceindex: 14
      text: \kelA! Chtěl bys na tuhle brigádu, SUNNY?\! V tom případě přijdu později.\! Hlavně píle, jo?

#Intro
message_0:
      text: \n<PRODAVAČ NÁŘADÍ>Nazdar prcku! Vidím, jak tady koukáš na ten plakát!\!<br>Chtěl by sis rychle přivydělat?

#[Nod/Shake]
#[Nod]
message_1:
      text: \n<PRODAVAČ NÁŘADÍ>Tak to je skvělý!\! Jdeme na to.
#[Shake]
message_2:
      text: \n<PRODAVAČ NÁŘADÍ>Tak dobře.<br>\!Ale kdybys někdy potřeboval peníze, jen se ozvi.

#Tool Names
message_3:
      text: VRTAČKU

message_4:
      text: PÁSKU

message_5:
      text: LOPATU

message_6:
      text: PILKU

message_7:
      text: KLADIVO

message_8:
      text: HASÁK

message_9:
      text: Chtěl bys sem položit \v[815]?

message_10:
      text: Co chceš zaměnit?

message_11:
      text: Dal jsi \v[813] tam, kde jsi předtím měl \v[815].

message_12:
      text: Práve držíš \v[815].

message_13:
      text: Položil jsi \v[815].

message_14:
      text: Co bys chtěl vzít?

message_15:
      text: Vzal jsi \v[815].

# Trying to leave the shop without finishing your job
message_16:
      text: \n<PRODAVAČ NÁŘADÍ>Hej! Kam si myslíš, že jdeš?

message_17:
      text: \n<PRODAVAČ NÁŘADÍ>Snad jsme se na něčem domluvili!\! Dotřiď to zboží a dostaneš zaplaceno!

# Complete
message_18:
      text: Všechno je konečně tam, kde má být.

#Rule Explanation
message_23:
      text: \n<PRODAVAČ NÁŘADÍ>Dobrá, prcku.\! Pořádně se podívej na tyhle poličky a brzo ti dojde, že tady máme hroznej bordel!

message_24:
      text: \n<PRODAVAČ NÁŘADÍ>Dalo by se čekat, že by lidi věděli, kam co patří, zvlášť, když u toho jsou cedule...\! Ach jo...\! Já tuhle fachu tak nesnáším...

message_21:
      text: \n<PRODAVAČ NÁŘADÍ>Každopádně, ty cedule značí, kde by mělo co být.\! A ty to teď musíš podle nich vytřídit, jasný?\! A teď už je to jen na tobě, prcku.

#Quest Finish

message_22:
      text: \n<PRODAVAČ NÁŘADÍ>\sinv[1]Chrr...\| Chrr...\!\sinv[0] C-Cože? Co? Už máš konečně hotovo?\!<br>Skvělá práce, prcku!\! Tady máš třicet korun?!\!<br>Ne, že je utratíš za nějakou capinu!

#Return to Party:
message_40:
      faceset: MainCharacters_Faraway
      faceindex: 24
      text: \KelAhoj, SUNNY! Tak co, jak ti to šlo?\! Zatímco jsi pracoval jsem si <br>šel do parku zahrát basket!\!<br>Ty jo, to byla sranda...\! Každopádně...\! Řekni a jdeme!

message_30:
      text: \n<PRODAVAČ NÁŘADÍ>Hmm...\! Takže, jak jsme na tom...\! No... jo! Už jsme skoro doma!\! Jen do toho!
