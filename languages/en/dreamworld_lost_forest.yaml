# =========================================================================================
# DADDY LONGLEGS
# ========================================================================================

#He always says this first. The rest, he says based on how many times you entered any map in the lost forest.

message_0:
    text: \n<POKOUTNÍK>Vítej ve \c[11]ZTRACENÉM LESE\c[0], kde najdeš věci, o kterých jsi ani nevěděl, že jsou ztracené...\! A nebo možná byly z jistého důvodu zavrhnuty. #zapovězeny se nehodí, pro odpor ke slovu zapomenuty dávám zavrhnuty

#He always says this stuff, left as is so the player could know how hot or cold they are:

message_1:
    text:  \n<POKOUTNÍK>Samosebou každy z nás má nějaké to tajemství...\! Ale ať jej zakopeme do jakékoliv hloubky, stejně jednou vyjde na povrch.. #pravopis blíže orig

message_2:
    text:  \n<POKOUTNÍK>Snažíš se ztratit? A nebo se ti to již povedlo?\! Ať už to je jakkoli, jsi na správném místě.\! Možná proto jsi sem přišel... aby jsi dokončil to, co jsi začal. #blíže orig, spisovnější

#Alternate

message_3:
    text:  \n<POKOUTNÍK>Většinou děláme to, co chceme dělat... a ne to, co říkáme, že děláme.\! Já neřeším chtíče.\! Spíše se řídím potřebami.

message_4:
    text:  \n<POKOUTNÍK>A radil bych ti, aby ses pokusil najít cestu ven již teď. Dokud tvé "potřeby" nevyjdou dosti najevo.

message_5:
    text:  \n<POKOUTNÍK>Už jsi kolem mě prošel \v[109]krát.

#If：Lost Forest Entrances  8

message_6:
    text:  \n<POKOUTNÍK>Ty tady ještě pořád jsi?\! Buď ses vzdal nebo jsi zcela přijal svůj osud.\! Možná je to doznání, to však není snadné posoudit. #blíže orig

message_7:
    text:  \n<POKOUTNÍK>Už jsi kolem mě prošel \v[109]krát.

#  If：Lost Forest Entrances = 9

message_8:
    text:  \n<POKOUTNÍK>Viděl jsem kluka, dost podobného tobě. Procházel se tudy.\! Vstoupil do tmy a už se nevrátil.

message_9:
    text:  \n<POKOUTNÍK>Musel se cítit vyčítavě, když nenašel to, co zde pohledával.\! Zda to byla lítost, prohra či zmatení, se už nedozvíme. #přirozenější, blíže orig

#  If：Lost Forest Entrances = 12

message_10:
    text:  \n<POKOUTNÍK>Již jsem spatřil slepé i ztracené, ale kombiance obou je děsivá.\! Možná se schováváš před tou správnou cestou. #blíže orig. Daddy Longlegs vždycky mluvil trochu podivně

#  If：Lost Forest Entrances = 15

message_11:
    text:  \n<POKOUTNÍK>Zlomyslní nemívají zábrany.\! Avšak za zlomyslností stojí vždy úmysly.\! Proč jdeš nadále touhle cestou, když víš, že není ta správná?

#This stuff is unique to the map that you're on. He says it directly after the stuff above.

#MAP 1
message_12:
    text:  \n<POKOUTNÍK>Znám staré přísloví o plýtvání časem, který ti nepatří.\! Sny tak občas působí. Působí stejně jako tento les.\! Ztraceně... #překlep

#MAP 2
message_13:
    text:  \n<POKOUTNÍK>Občas když před sebou něco schováváme, vytvoříme si své vlastní pravdy a zcela sejdeme z cesty.\!<br>Vrátil ses na ni a nebo jsi stále ztracený? #blíže orig

#MAP 5
message_18:
    text:  \n<POKOUTNÍK>Zapomeň, co chceš, či spíše co můžeš.\! Temnota se před tebou zhmotní, ať už si to uvědomuješ, nebo ne.\! Schovej vše, v čem žiješ do nevědomosti a sleduj, jak se ti tvá lež boří před očima. #nedává mi smysl v originále

#Once you complete the forest, his page 2 is always:
message_19:
    text:  \n<POKOUTNÍK>Tma, která tě obklopuje, je strašná věc, avšak tě k ní přivedla jedině tvá "pravda".\! Jak dlouho s ní ještě budeš moct žít?

#END

message_21:
    text:  \n<POKOUTNÍK>Zde končí \c[11]ZTRACENÝ LES\c[0]...<br>a začíná pravda.

message_22:
    text:  \n<POKOUTNÍK>Řeknu ti příběh ztracen ve větru času...\!<br>příběh o stvoření tohoto světa. #hahaha, Timewind

message_23:
    text:  \n<POKOUTNÍK>Na počátku byli jen dva...\!<br>SNÍLEK a jeho místnost.

message_24:
    text:  \n<POKOUTNÍK>SNÍLKA jeho místnost brzo omrzela, a proto vytvořil dveře, které ho dovedly do jiných světů.

message_25:
    text:  \n<POKOUTNÍK>Jakožto návštěvník v těchto světech si v nich mohl SNÍLEK počínat tak, jak se mu jen zalíbilo.

message_26:
    text:  \n<POKOUTNÍK>Skluzy, pády...\! Zvědavost nakonec dovedla SNÍLEKA kamsi jinam. #zní lépe

message_27:
    text:  \n<POKOUTNÍK>Do světa zcela odlišného...\!<br>Do světa vytapetovaného chaosem a omytého temnotou. #vytapetovaného na tapetovaného

message_28:
    text:  \n<POKOUTNÍK>SNÍLKA brzy začal přemáhat strach. \!Ač byly ještě stále tiché, již tehdy začal slýchat šepoty svých zlomyslných myšlenek.\! Šepoty, ve kterých se skrývaly jak lži, tak tajemství i pravdy. #pravopis, i místo a

message_29:
    text:  \n<POKOUTNÍK>Jejich hluk nebyl schopen zastavit, a tak do všech svých světů nastolil stvoření podřízená jeho vůli...

message_30:
    text: \n<POKOUTNÍK>A všechny své světy stavěl nad ten temný...\! čímž jej konečně uzavřel. #odstavil rozhodně není to správné slovo, ale ani tady si nejsem jistý, budu se muset k tomuhle později vrátit

message_31:
    text:  \n<POKOUTNÍK>Ale navzdory jeho snah temnota plně nevymizela.\! I se svými novými spojenci se SNÍLKOVI nepovedlo zbavit té temnoty, která se mu škrábala a ryla do mysli.

message_32:
    text: \n<POKOUTNÍK>Šepoty možná utichly, ale nevymizely. #pravopis

message_33:
    text: \n<POKOUTNÍK>SNÍLEK sice mohl utéci a schovat všechny své potíže, ovšem svého stínu se zbavit nemohl.

message_34:
    text:  \n<POKOUTNÍK>To, co SNÍLEK vytvořil byla skutečnost, ve které nemohl žít, do které nepatřil.

message_35:
    text:  \n<POKOUTNÍK>SNÍLKOVA moc byla zároveň jeho kámenem úrazu.\!<br>A vědomost... či spíše nevědomost, jeho záchranou.

message_36:
    text:  \n<POKOUTNÍK>Jen poté, co by utekl ze svárů svých vjemů do blaženého světa své nevědomosti...\! Jen poté by šepoty temnoty utichly.

message_37:
    text:  \n<POKOUTNÍK>A proto...\! se SNÍLEK vzdal svého jména...\!<br>našel si jiné a rozhodl se sám sebe zapomenout.

message_38:
    text:  \n<POKOUTNÍK>A od té doby žije ten SNÍLEK mezi námi...<br>\!jakožto prostý obyvatel našeho světa...\!<br>Radostně cestující, nevědě o iluzi, kterou si sám vytvořil.

#leave

message_39:
    text:  \n<POKOUTNÍK>Tato cesta není pro ty, jež nemají dosti silné srdce.\! Přály byste si odejít, děti?\! Nedivil bych se vám.

#message_39:
#    text:  \n<POKOUTNÍK>Do you understand, children?
    #YES/NO

#message_40:
#    text: \n<POKOUTNÍK>Good.\! Now, I will leave you with a warning.

#message_41:
#    text: \n<POKOUTNÍK>I'm sorry. As conflicted as I am, this tale was not meant to be repeated.\! Now, I will leave you with a warning.

message_41:
    text: \n<POKOUTNÍK>Děti... Musím vás varovat...

message_42:
    text:  \n<POKOUTNÍK>Stejně jako všechno v něm, i tento svět zná konce.\! A přestože se SNÍLKOVI podařilo zadržet nezardžitelné, temnota stále vytrvává.

message_43:
    text:  \n<POKOUTNÍK>Věčnou ránu nezakryje žádný obvaz...\! a nastane čas, kdy její vliv plně přeteče do tohoto světa.<br><br>A i když se SNÍLEK snaží na své starosti zapomenout, ony na něj zapomenout nedokážou. #snažil jsem se zachovat originál, ale mám strach, že to v ČJ prostě nejde

message_44:
    text:  \n<POKOUTNÍK>Konec tohoto světa je neodvratný.\! Ovšem SNÍLEK je jediný, kdo ho je schopen jednou pro vždy vysvobodit.

message_50:
    text: Tento svícen byl zapálen nedávno.

message_51:
    text: Starý pařez.
