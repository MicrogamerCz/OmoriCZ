# =========================================================================================
# ** ŠNEČEK Arc 1 - Construction
# =========================================================================================

message_0:
    text: \n<ŠNEČÍK>Přátelé, rád vás opět vidím!\! Skvělé počasí, že?

message_1:
    text: \n<ŠNEČÍK>Vypadáte velmi silně. A já bych taky chtěl být velmi silný!\! Pomůžete mi?

#YES
message_2:
    text: \n<ŠNEČÍK>Tak to se budu pořádně snažit!

#NO
message_3:
    text: \n<ŠNEČÍK>Ale já bych chtěl být silný, stejně jako vy...

#let him live

message_4:
    text: \n<ŠNEČÍK>Ty jo, vy to teda máte na háku!\! Na oplátku si vemte tohle \c[3]KAFE\c[0]!\! Dostal jsem ho od mých kamarádů, a teď už je jen a pouze vaše!

message_5:
    text: \n<ŠNEČÍK>A nyní zalezu do této hrozivě vypadající jeskyně a budu trénovat svou mysl a své tělo.\! Až se znovu střetneme, budu zase o něco silnější!

# =========================================================================================
# ** ŠNEČEK Arc 1 - Cave
# =========================================================================================


message_6:
    text: \n<ŠNEČÍK>Přátelé, rád vás opět vidím!\! Skvělé počasí, že?

message_7:
    text: \n<ŠNEČÍK>Od našeho posledního setkání jsem nabyl dost na síle.\! Mohl bych si na vás vyzkoušet své nové schopnosti?

message_9:
    text: \n<ŠNEČÍK>Díky! Cítím se zase o něco silněji...\! Na oplátku si vemte tohle \c[3]KAFE\c[0]!\! Dostal jsem ho od mých kamarádů, a teď už je jen a pouze vaše!

message_10:
    text: \n<ŠNEČÍK>A nyní přejdu přes tento nebezpečně vypadající most, abych mohl své \c[1]DOVEDNOSTI\c[0] dále hnát k dokonalosti.\! Až se znovu střetneme, budu zase o něco silnější!

# =========================================================================================
# ** ŠNEČEK Arc 1 - Bridge
# =========================================================================================

message_11:
    text: \n<ŠNEČÍK>Přátelé, rád vás opět vidím!\! Skvělé počasí, že?

message_12:
    text: \n<ŠNEČÍK>Má mysl a mé tělo jsou v dokonalé harmonii. Taky jsem se naučil svou ultimátní \c[1]DOVEDNOST\c[0]!\! Myslím, že tohle si vyžaduje další zkoušku.\! Nemyslíte snad?


# =========================================================================================
# ** ŠNEČEK Arc 1 - Bridge
# =========================================================================================


message_16:
    text: Získal jsi \c[3]KAFE\c[0]!


#----------------------------
# ** IN BATTLE: ŠNEČEK 1
#----------------------------

message_21:
   text: >
    \>ŠNEČÍK: \<Super! Můj první souboj!\! Jde se na věc!

message_22:
    text: >
     \>ŠNEČÍK: \<Ty jo, tohle je celkem makačka...\! Měl bych zabrat!

message_23:
    text: >
     \>ŠNEČÍK: \<Uff...\! Nevím, jestli na tohle mám...

message_24:
    text: >
     \>ŠNEČÍK: \<Dobře, prosím, už dost! To stačilo!

#----------------------------
# ** IN BATTLE: ŠNEČEK 2
#----------------------------

message_25:
    text: >
     \>ŠNEČÍK: \<Po našem minulém střetu jsem se naučil pár suprovních \c[1]DOVEDNOSTÍ\c[0]!\! Bacha na mě!

message_26:
    text: >
     \>ŠNEČÍK: \<\sinv[1]To bylo hustý, co!?\sinv[0] Jsem super!

message_27:
    text: >
     \>ŠNEČÍK: \<A \c[1]NÁSLEDNÉ ÚTOKY\c[0] už taky zvládám! Jen se dívejte!

message_28:
    text: >
     \>ŠNEČÍK: \<Tak co vy na to!?\! Jednou budu tak silný, jako vy!

#----------------------------
# ** IN BATTLE: ŠNEČEK 3
#----------------------------

message_29:
    text: >
     \>ŠNEČÍK: \<Teď už jsem beztak alespoň tak silný, jako vy!\! Být váma bych tohle bral vážně!

message_30:
    text: >
     \>ŠNEČÍK: \<Ha! Nejste tady jediní s EMOCEMA!

message_31:
    text: >
     \>ŠNEČÍK: \<A teď nadešel čas na mou \sinv[1]\c[1]ULTIMÁTNÍ DOVEDNOST\c[0]\sinv[0]!

message_32:
   text: >
    ŠNEČÍK je SMUTNÝ...

message_33:
   text: >
    ŠNEČÍK má RADOST!
