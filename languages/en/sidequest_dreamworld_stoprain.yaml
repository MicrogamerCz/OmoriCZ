message_22:
      text: Nejde jím hnout.

#Talk to Potatogirl after adjusting Valve
message_23:
      text: \n<ZELENINÁČEK>Déšť byl zkrocen!\! Super!\!<br>Děkujeme ti, VYVOLENÝ!\!<br>Na tvou laskavost nikdy nezapomeneme.

#TOMATO KID walks up
message_24:
      text: \n<ZELENINÁČEK>Copak, dítě?\! Chtěla bys s jít nima?\! Vážně?

#ZELENIŇÁČEK (Tomato) turns to ZELENIŇÁČEK (Potato).

message_25:
      text: \n<ZELENINÁČEK>Je-li to opravdu tvé přání...

message_26:
      text: \n<ZELENINÁČEK>VYVOLENÝ...\! Toto dítě by si tě přálo doprovázet.\!<br>Teď je tvoje.\! Dávej na něj prosím pozor.

message_27:
      text: Získal jsi \c[13]ZELENINÁČKA\c[0].

#Potato speaking:
message_28:
      text: \n<ZELENINÁČEK>Jen tak dál, hrdinové! Vyražte své cestě naproti!

#QUEST complete

#After quest dialogue

#talk to potatogirl
message_29:
      text: \n<ZELENINÁČEK>Jen tak dál, hrdinové! Vyražte své cestě naproti!

#extra veggie kid VILLAGERS

message_30:
      text: \n<ZELENINÁČEK>Déšť je dokonale vyrovnaný!

message_31:
      text: \n<ZELENINÁČEK>Ach...\! to je tak...\! příjemné...

message_32:
      text: \n<ZELENINÁČEK>Jsem spokojen s množstvím deště.

message_33:
      text: \n<ZELENINÁČEK>Déšť je teď příjemný, když je ho méně...

message_34:
      text: \n<ZELENINÁČEK>Prší tady tak akorát, nemyslíš?

message_35:
      text: \n<ZELENINÁČEK>Je mi dobře.

message_36:
      text: \n<ZELENINÁČEK>Tenhle déšť je super!

message_37:
      text: \n<ZELENINÁČEK>Cítím se pohodlně.

message_38:
      text: \n<ZELENINÁČEK>Na měřítku příjemnosti a nepříjemnosti,\. kde číslo jedna značí pocit velice příjemný a deset velice nepříjemný,\. se nacházím na jedničce.

message_39:
      text: \n<ZELENINÁČEK>Hurá!

message_40:
      text: \n<ZELENINÁČEK>Cítím se skvěle!

message_41:
      text: \n<ZELENINÁČEK>Jupí!

message_42:
      text: \n<ZELENINÁČEK>Jo!

message_43:
      text: \n<ZELENINÁČEK>Super!

message_44:
      text: \n<ZELENINÁČEK>Žůžo!

message_50:
      text: Hladina se leskne.

message_51:
      text: Chceš se na ni nevraživě pohlédnout?

message_52:
      text: Cítíš, jak z hladiny stoupá temná moc.
