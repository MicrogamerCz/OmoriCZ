#Talk to Potatogirl

message_1:
      text: \n<ZELENINÁČEK>\Com[2]Ááááá!\! Ten déšť je hrozný!\!<br>Cítíme se kvůli němu mírně nepříjemně!

message_2:
      text: \n<ZELENINÁČEK>Nedaleko odsud je kouzelný kohoutek, který ho ovldádá, ale může jím točit jedině VYVOLENÝ...

message_3:
      text: \n<ZELENINÁČEK>Jestli nám nikdo nepomůže, budeme se cítit mírně nepříjemně nadosmrti!

#EXTRA ZELENIŇÁČEK VILLAGERS:

message_4:
      text: \n<ZELENINÁČEK>Cítíme se mírně nepříjemně!\! Prosím, už dost!

message_5:
      text: \n<ZELENINÁČEK>To množství deště mě trochu otravuje.

message_6:
      text: \n<ZELENINÁČEK>Kéž by jen pršelo o něco méně...

message_7:
      text: \n<ZELENINÁČEK>Prší tady poněkud moc, nemyslíš?

message_8:
      text: \n<ZELENINÁČEK>Není mi dobře.

message_9:
      text: \n<ZELENINÁČEK>Ten déšť je trochu nesnesitelný.

message_10:
      text: \n<ZELENINÁČEK>Cítím se poněkud nepohodlně.

message_11:
      text: \n<ZELENINÁČEK>Na měřítku nepohodlí a pohodlí,\. kde značí 1 pohodlí a 10 nepohodlí,\. se cítím tak na 6.

message_12:
      text: \n<ZELENINÁČEK>Blé!

message_13:
      text: \n<ZELENINÁČEK>Au!

message_14:
      text: \n<ZELENINÁČEK>Fuj!

message_15:
      text: \n<ZELENINÁČEK>Fujky!

message_16:
      text: \n<ZELENINÁČEK>Fujtajbl!

message_17:
      text: \n<ZELENINÁČEK>To je hnůj!

#EXAMINE VALVE AS OMORI

message_18:
      text: Otočíš kohoutkem mírně doleva nebo doprava?

#[RIGHT/LEFT]
#[RIGHT]
message_19:
      text: DOPRAVA
#RAIN BECOMES lighter
#Song changes to Puddles

message_20:
      text: Prší o něco méně.

#[LEFT]
message_21:
      text: DOLEVA
